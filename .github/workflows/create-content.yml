name: Create Content

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID (ch1-ch6)'
        required: true
        default: 'ch1'
        type: choice
        options: [ch1, ch2, ch3, ch4, ch5, ch6]
      topic:
        description: 'Topic (leave blank to auto-pick)'
        required: false
        default: ''

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      HF_HUB_DISABLE_PROGRESS_BARS: '1'
      TRANSFORMERS_VERBOSITY: error

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq espeak-ng ffmpeg \
            chromium-browser libgbm-dev \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxkbcommon0 libxdamage1 libpango-1.0-0 libcairo2

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        run: npm install

      - name: Write .env
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          YT_CH1_CLIENT_ID: ${{ secrets.YT_CH1_CLIENT_ID }}
          YT_CH1_CLIENT_SECRET: ${{ secrets.YT_CH1_CLIENT_SECRET }}
          YT_CH1_REFRESH_TOKEN: ${{ secrets.YT_CH1_REFRESH_TOKEN }}
          YT_CH2_CLIENT_ID: ${{ secrets.YT_CH2_CLIENT_ID }}
          YT_CH2_CLIENT_SECRET: ${{ secrets.YT_CH2_CLIENT_SECRET }}
          YT_CH2_REFRESH_TOKEN: ${{ secrets.YT_CH2_REFRESH_TOKEN }}
          YT_CH3_CLIENT_ID: ${{ secrets.YT_CH3_CLIENT_ID }}
          YT_CH3_CLIENT_SECRET: ${{ secrets.YT_CH3_CLIENT_SECRET }}
          YT_CH3_REFRESH_TOKEN: ${{ secrets.YT_CH3_REFRESH_TOKEN }}
          YT_CH4_CLIENT_ID: ${{ secrets.YT_CH4_CLIENT_ID }}
          YT_CH4_CLIENT_SECRET: ${{ secrets.YT_CH4_CLIENT_SECRET }}
          YT_CH4_REFRESH_TOKEN: ${{ secrets.YT_CH4_REFRESH_TOKEN }}
          YT_CH5_CLIENT_ID: ${{ secrets.YT_CH5_CLIENT_ID }}
          YT_CH5_CLIENT_SECRET: ${{ secrets.YT_CH5_CLIENT_SECRET }}
          YT_CH5_REFRESH_TOKEN: ${{ secrets.YT_CH5_REFRESH_TOKEN }}
          YT_CH6_CLIENT_ID: ${{ secrets.YT_CH6_CLIENT_ID }}
          YT_CH6_CLIENT_SECRET: ${{ secrets.YT_CH6_CLIENT_SECRET }}
          YT_CH6_REFRESH_TOKEN: ${{ secrets.YT_CH6_REFRESH_TOKEN }}
        run: printenv | grep -E '^(GROQ|SAMBANOVA|GEMINI|NVIDIA|MISTRAL|ANTHROPIC|HF_TOKEN|YT_)' > .env

      - name: Cache kokoro-onnx models
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro-onnx
          key: kokoro-onnx-v1-${{ runner.os }}

      - name: Download TTS models
        timeout-minutes: 8
        run: python3 -c "import sys; sys.path.insert(0,'src/scripts'); from tts import _download_kokoro_models; _download_kokoro_models()"

      - name: Generate content
        run: |
          CH=${{ github.event.inputs.channel }}
          TOPIC="${{ github.event.inputs.topic }}"
          if [ -n "$TOPIC" ]; then
            python src/scripts/pipeline.py --channel "$CH" --topic "$TOPIC"
          else
            python src/scripts/pipeline.py --channel "$CH"
          fi

      - name: Create audio placeholders
        run: |
          CH=${{ github.event.inputs.channel }}
          mkdir -p public/music public/sfx public/audio

          [ -f "public/music/${CH}.mp3" ] || \
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 35 -b:a 32k "public/music/${CH}.mp3" -y -loglevel quiet

          for sfx in hit_electronic hit_corporate hit_dark hit_soft hit_cinematic hit_space \
                     reveal pop tick swoosh sting bell element_entrance beat_transition; do
            [ -f "public/sfx/${sfx}.mp3" ] || \
              ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 0.5 -b:a 32k "public/sfx/${sfx}.mp3" -y -loglevel quiet
          done

          MISSING=0
          if [ -f "out/${CH}/manifest.json" ]; then
            for beat in hook context beat_0 beat_1 beat_2 beat_3 beat_4 twist outro; do
              mp3="public/audio/${CH}_${beat}.mp3"
              json="public/audio/${CH}_${beat}_words.json"
              [ -f "$mp3" ] || { ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 1 -b:a 32k "$mp3" -y -loglevel quiet; MISSING=$((MISSING+1)); echo "::warning::TTS missing for ${CH}_${beat}"; }
              [ -f "$json" ] || echo '[]' > "$json"
            done
          fi

          [ "$MISSING" -eq 0 ] || { echo "::error::${MISSING} beat(s) missing TTS — aborting"; exit 1; }

      - name: Bundle Remotion
        run: npx remotion bundle

      - name: Render video
        env:
          REMOTION_CHROME_EXECUTABLE: /usr/bin/chromium-browser
        run: python src/scripts/render_all.py --channel ${{ github.event.inputs.channel }}

      - name: Upload to YouTube
        run: python src/scripts/upload_all.py --channel ${{ github.event.inputs.channel }}

      - name: Archive output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.event.inputs.channel }}-run${{ github.run_number }}
          path: out/${{ github.event.inputs.channel }}/
          retention-days: 7
