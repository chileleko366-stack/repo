name: Dopamine Studios — Twice-Daily Pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 SAST
    - cron: '0 16 * * *'  # 18:00 SAST
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel ID to run (leave blank for all)'
        required: false
        default: ''

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  run-pipeline:
    name: ${{ matrix.channel }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        channel: [ch1, ch2, ch3, ch4, ch5, ch6]
    env:
      HF_HUB_DISABLE_PROGRESS_BARS: "1"

    # Skip matrix entries that don't match the manually chosen channel
    if: >-
      github.event.inputs.channel == '' ||
      github.event.inputs.channel == matrix.channel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq espeak-ng ffmpeg

      - run: pip install -r requirements.txt

      - name: Install system deps for Remotion
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            chromium-browser libgbm-dev \
            libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libxkbcommon0 libxdamage1 libpango-1.0-0 libcairo2

      - name: Write .env
        run: |
          cat > .env << 'ENVEOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          SAMBANOVA_API_KEY=${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          YT_CH1_CLIENT_ID=${{ secrets.YT_CH1_CLIENT_ID }}
          YT_CH1_CLIENT_SECRET=${{ secrets.YT_CH1_CLIENT_SECRET }}
          YT_CH1_REFRESH_TOKEN=${{ secrets.YT_CH1_REFRESH_TOKEN }}
          YT_CH2_CLIENT_ID=${{ secrets.YT_CH2_CLIENT_ID }}
          YT_CH2_CLIENT_SECRET=${{ secrets.YT_CH2_CLIENT_SECRET }}
          YT_CH2_REFRESH_TOKEN=${{ secrets.YT_CH2_REFRESH_TOKEN }}
          YT_CH3_CLIENT_ID=${{ secrets.YT_CH3_CLIENT_ID }}
          YT_CH3_CLIENT_SECRET=${{ secrets.YT_CH3_CLIENT_SECRET }}
          YT_CH3_REFRESH_TOKEN=${{ secrets.YT_CH3_REFRESH_TOKEN }}
          YT_CH4_CLIENT_ID=${{ secrets.YT_CH4_CLIENT_ID }}
          YT_CH4_CLIENT_SECRET=${{ secrets.YT_CH4_CLIENT_SECRET }}
          YT_CH4_REFRESH_TOKEN=${{ secrets.YT_CH4_REFRESH_TOKEN }}
          YT_CH5_CLIENT_ID=${{ secrets.YT_CH5_CLIENT_ID }}
          YT_CH5_CLIENT_SECRET=${{ secrets.YT_CH5_CLIENT_SECRET }}
          YT_CH5_REFRESH_TOKEN=${{ secrets.YT_CH5_REFRESH_TOKEN }}
          YT_CH6_CLIENT_ID=${{ secrets.YT_CH6_CLIENT_ID }}
          YT_CH6_CLIENT_SECRET=${{ secrets.YT_CH6_CLIENT_SECRET }}
          YT_CH6_REFRESH_TOKEN=${{ secrets.YT_CH6_REFRESH_TOKEN }}
          ENVEOF

      - name: Cache kokoro-onnx models
        uses: actions/cache@v4
        with:
          path: ~/.cache/kokoro-onnx
          key: kokoro-onnx-models-v1-${{ runner.os }}

      - name: Pre-download kokoro-onnx models
        timeout-minutes: 8
        run: |
          python3 -c "import sys; sys.path.insert(0, 'src/scripts'); from tts import _download_kokoro_models; _download_kokoro_models(); print('kokoro models ready')"

      - name: Generate content (Python pipeline)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TRANSFORMERS_VERBOSITY: "error"
        run: python src/scripts/pipeline.py --channel ${{ matrix.channel }}

      - name: Create silent audio placeholders if missing
        run: |
          mkdir -p public/music public/sfx public/audio

          # Music beds (35s loop)
          CH="${{ matrix.channel }}"
          if [ ! -f "public/music/${CH}.mp3" ]; then
            ffmpeg -f lavfi -i anullsrc=r=44100:cl=stereo -t 35 \
              -b:a 32k "public/music/${CH}.mp3" -y -loglevel quiet
          fi

          # SFX (0.5s silent stub for every expected file)
          for sfx in hit_electronic hit_corporate hit_dark hit_soft hit_cinematic hit_space \
                     reveal pop tick swoosh sting bell element_entrance beat_transition; do
            if [ ! -f "public/sfx/${sfx}.mp3" ]; then
              ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 0.5 \
                -b:a 32k "public/sfx/${sfx}.mp3" -y -loglevel quiet
            fi
          done

          # Beat audio stubs for this channel only
          MISSING_BEATS=0
          dir="out/${CH}"
          if [ -f "${dir}/manifest.json" ]; then
            for beatid in hook context beat_0 beat_1 beat_2 beat_3 beat_4 twist outro; do
              mp3="public/audio/${CH}_${beatid}.mp3"
              json="public/audio/${CH}_${beatid}_words.json"
              if [ ! -f "$mp3" ]; then
                echo "::warning::TTS missing — inserting silent placeholder for ${CH}_${beatid}.mp3"
                ffmpeg -f lavfi -i anullsrc=r=44100:cl=mono -t 1 \
                  -b:a 32k "$mp3" -y -loglevel quiet
                MISSING_BEATS=$((MISSING_BEATS + 1))
              fi
              if [ ! -f "$json" ]; then
                echo '[]' > "$json"
              fi
            done
          fi
          if [ "$MISSING_BEATS" -gt 0 ]; then
            echo "::error::${MISSING_BEATS} beat(s) have silent placeholder audio — TTS failed. Aborting upload."
            exit 1
          fi

      - name: Bundle Remotion
        run: npx remotion bundle

      - name: Render video
        env:
          REMOTION_CHROME_EXECUTABLE: /usr/bin/chromium-browser
        run: python src/scripts/render_all.py --channel ${{ matrix.channel }}

      - name: Upload to YouTube
        run: python src/scripts/upload_all.py --channel ${{ matrix.channel }}

      - name: Save rendered video (debug archive)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shorts-${{ matrix.channel }}-run-${{ github.run_number }}
          path: out/${{ matrix.channel }}/
          retention-days: 3
