name: Test rembg model reachability (temporary)

# Checks whether a GitHub Actions runner can reach rembg's own upstream
# model URL directly, before assuming the model-files-v1 release-mirror
# approach (upload-models.yml) is necessary. Sandboxed agent/dev environments
# have a restrictive egress proxy that blocks this URL (confirmed 403); GH
# Actions runners are a different network entirely and typically have full
# internet access, so this needs to be checked on Actions itself, not
# inferred from the agent sandbox. Delete this workflow once the answer is
# known and acted on.

on:
  workflow_dispatch:
  push:
    branches: [claude/consistency-pass]
    paths: [.github/workflows/test-rembg-reachability.yml]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: curl u2net.onnx from rembg's actual upstream release
        run: |
          set -x
          URL="https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx"
          START=$(date +%s)
          HTTP_CODE=$(curl -sL -o /tmp/test_u2net.onnx -w '%{http_code}' --max-time 120 "$URL") || true
          END=$(date +%s)
          echo "HTTP code: $HTTP_CODE"
          echo "Elapsed: $((END-START))s"
          if [ -f /tmp/test_u2net.onnx ]; then
            echo "Downloaded size: $(du -sh /tmp/test_u2net.onnx | cut -f1)"
            echo "MD5: $(md5sum /tmp/test_u2net.onnx | cut -d' ' -f1)"
            echo "Expected MD5: 60024c5c889badc19c04ad937298a77b"
          fi
          if [ "$HTTP_CODE" = "200" ]; then
            echo "::notice::GH Actions CAN reach rembg's upstream URL directly (HTTP 200)"
          else
            echo "::warning::GH Actions got HTTP $HTTP_CODE from rembg's upstream URL — same restriction as the agent sandbox, or a different failure"
          fi
