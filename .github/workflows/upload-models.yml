name: Upload Model Files to Release

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release and upload kokoro model files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: chileleko366-stack/repo
          TAG: model-files-v1
        run: |
          set -e

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Model Files" \
            --notes "kokoro-onnx TTS models for Dopamine Studios" \
            --latest=false 2>/dev/null || echo "Release already exists, uploading to it"

          echo "Downloading kokoro-v1.0.onnx..."
          curl -fL --retry 3 -o /tmp/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          echo "Size: $(du -sh /tmp/kokoro-v1.0.onnx)"

          echo "Uploading kokoro-v1.0.onnx..."
          gh release upload "$TAG" /tmp/kokoro-v1.0.onnx --repo "$REPO" --clobber

          echo "Downloading voices-v1.0.bin..."
          curl -fL --retry 3 -o /tmp/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"
          echo "Size: $(du -sh /tmp/voices-v1.0.bin)"

          echo "Uploading voices-v1.0.bin..."
          gh release upload "$TAG" /tmp/voices-v1.0.bin --repo "$REPO" --clobber

          echo "Done — https://github.com/$REPO/releases/tag/$TAG"
