name: Upload Kokoro Models to Release
on:
  workflow_dispatch:  # manual trigger only — run once to populate the release

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create releases and upload assets
    steps:
      - name: Download and upload kokoro models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release (fails gracefully if already exists)
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/chileleko366-stack/repo/releases \
            -d '{
              "tag_name": "model-files-v1",
              "name": "Kokoro ONNX Models",
              "body": "kokoro-onnx model files for Dopamine Studios TTS",
              "draft": false,
              "prerelease": false
            }')

          UPLOAD_URL=$(echo "$RELEASE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
url = data.get('upload_url', '')
if not url:
    print('ERROR: no upload_url in response:', file=sys.stderr)
    print(json.dumps(data, indent=2), file=sys.stderr)
    sys.exit(1)
print(url.replace('{?name,label}', ''))
")

          echo "Upload URL: $UPLOAD_URL"

          # kokoro-v1.0.onnx (~280MB)
          echo "Downloading kokoro-v1.0.onnx..."
          curl -L --retry 3 -o /tmp/kokoro-v1.0.onnx \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx"
          echo "Size: $(du -sh /tmp/kokoro-v1.0.onnx)"

          echo "Uploading kokoro-v1.0.onnx..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=kokoro-v1.0.onnx" \
            --data-binary @/tmp/kokoro-v1.0.onnx | python3 -c "
import sys,json; d=json.load(sys.stdin)
print('Uploaded:', d.get('browser_download_url','ERROR'))"

          # voices-v1.0.bin (~25MB)
          echo "Downloading voices-v1.0.bin..."
          curl -L --retry 3 -o /tmp/voices-v1.0.bin \
            "https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin"
          echo "Size: $(du -sh /tmp/voices-v1.0.bin)"

          echo "Uploading voices-v1.0.bin..."
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "${UPLOAD_URL}?name=voices-v1.0.bin" \
            --data-binary @/tmp/voices-v1.0.bin | python3 -c "
import sys,json; d=json.load(sys.stdin)
print('Uploaded:', d.get('browser_download_url','ERROR'))"

          echo "All done — models available at:"
          echo "https://github.com/chileleko366-stack/repo/releases/tag/model-files-v1"
